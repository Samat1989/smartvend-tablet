
# static_qr payment functions. verify_jwt MUST be false: the project uses the
# new publishable key (sb_publishable_…) which is not a JWT, so verify_jwt=true
# rejects the storefront's requests with 401 "Invalid JWT". These functions are
# public payment endpoints (no secret is exposed; the amount is computed
# server-side), so anon access is intended.
[functions.create-payment]
enabled = true
verify_jwt = false

[functions.verify-payment]
enabled = true
verify_jwt = false

# Server-side reconciliation, invoked by the pg_cron job 'reconcile-payments'
# (no JWT — called from the DB via net.http_post).
[functions.cron-process-payments]
enabled = true
verify_jwt = false

# Push-based finalization from the ESP32 relay. On a SmartVend MQTT "Processed
# order" event the device POSTs { orderid } here with the publishable key (not a
# JWT) — so verify_jwt MUST be false. The function re-verifies the payment with
# the gateway before recording, so the public endpoint can't be used to forge a
# sale.
[functions.complete-order]
enabled = true
verify_jwt = false
entrypoint = "./functions/complete-order/index.ts"
